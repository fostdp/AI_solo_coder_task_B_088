version: "3.8"

services:
  clickhouse:
    image: clickhouse/clickhouse-server:24.1
    ports:
      - "8123:8123"
      - "9000:9000"
    volumes:
      - clickhouse-data:/var/lib/clickhouse
      - ./sql:/docker-entrypoint-initdb.d
    environment:
      CLICKHOUSE_DB: tiantan_acoustics
      CLICKHOUSE_USER: default
      CLICKHOUSE_PASSWORD: tiantan2024
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "localhost:8123/ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    networks:
      - tiantan-net

  mosquitto:
    image: eclipse-mosquitto:2
    ports:
      - "1883:1883"
    volumes:
      - ./mosquitto/mosquitto.conf:/mosquitto/config/mosquitto.conf
    networks:
      - tiantan-net

  backend:
    build: ./backend
    ports:
      - "8080:8080"
      - "9090:9090"
    environment:
      CLICKHOUSE_URL: http://clickhouse:8123
      CLICKHOUSE_DATABASE: tiantan_acoustics
      MQTT_HOST: mosquitto
      MQTT_PORT: "1883"
      RUST_LOG: info,tower_http=debug
      ACOUSTIC_CONFIG_PATH: /app/config/acoustic_config.json
      STI_WEIGHTS_CONFIG_PATH: /app/config/sti_weights.json
    depends_on:
      clickhouse:
        condition: service_healthy
      mosquitto:
        condition: service_started
    restart: on-failure
    networks:
      - tiantan-net

  frontend:
    image: nginx:1.25-alpine
    ports:
      - "80:80"
    volumes:
      - ./frontend:/usr/share/nginx/html
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - backend
    networks:
      - tiantan-net

  simulator:
    build:
      context: ./scripts
      dockerfile: Dockerfile
    environment:
      API_URL: http://backend:8080
      MQTT_HOST: mosquitto
    depends_on:
      - backend
    profiles:
      - simulator
    networks:
      - tiantan-net

networks:
  tiantan-net:
    driver: bridge

volumes:
  clickhouse-data:
