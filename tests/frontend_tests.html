<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>天坛声学系统 - 前端功能测试套件</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #0a0e27 0%, #1a1f3a 100%);
            color: #e8d4a8; padding: 20px; min-height: 100vh;
        }
        .container { max-width: 1100px; margin: 0 auto; }
        h1 {
            color: #d4af37; text-align: center; margin-bottom: 10px;
            font-size: 28px; text-shadow: 0 0 20px rgba(212, 175, 55, 0.3);
        }
        .subtitle { text-align: center; color: #a08050; margin-bottom: 30px; }
        .summary-bar {
            background: rgba(20, 30, 50, 0.8);
            border: 2px solid rgba(212, 175, 55, 0.5);
            border-radius: 10px; padding: 15px 20px; margin-bottom: 20px;
            display: grid; grid-template-columns: repeat(6, 1fr); gap: 10px;
        }
        .stat { text-align: center; }
        .stat-label { font-size: 11px; color: #a08050; margin-bottom: 4px; }
        .stat-value { font-size: 24px; font-weight: bold; font-family: monospace; }
        .total    .stat-value { color: #ffffff; }
        .passed   .stat-value { color: #44ff88; }
        .failed   .stat-value { color: #ff6666; }
        .errors   .stat-value { color: #ff9900; }
        .skipped  .stat-value { color: #888888; }
        .duration .stat-value { color: #d4af37; }

        .module {
            background: rgba(20, 30, 50, 0.6);
            border: 1px solid rgba(212, 175, 55, 0.3);
            border-radius: 8px; margin-bottom: 15px; overflow: hidden;
        }
        .module-header {
            background: rgba(212, 175, 55, 0.15);
            padding: 12px 16px; cursor: pointer;
            display: flex; justify-content: space-between; align-items: center;
            border-bottom: 1px solid rgba(212, 175, 55, 0.2);
        }
        .module-title { font-size: 16px; color: #d4af37; font-weight: bold; }
        .module-stats { font-size: 13px; font-family: monospace; }
        .module-stats .pass { color: #44ff88; }
        .module-stats .fail { color: #ff6666; }
        .module-body { padding: 10px 16px; }
        .case {
            padding: 8px 10px; margin-bottom: 4px; border-radius: 5px;
            display: flex; justify-content: space-between; align-items: center;
            font-size: 13px; background: rgba(0, 0, 0, 0.2);
        }
        .case.pass { border-left: 3px solid #44ff88; }
        .case.fail { border-left: 3px solid #ff6666; background: rgba(100, 20, 20, 0.2); }
        .case.error { border-left: 3px solid #ff9900; background: rgba(100, 60, 0, 0.2); }
        .case.skip { border-left: 3px solid #666; opacity: 0.6; }
        .case-id { font-family: monospace; color: #888888; width: 90px; flex-shrink: 0; }
        .case-name { flex: 1; margin: 0 10px; }
        .case-status { font-weight: bold; width: 80px; text-align: right; flex-shrink: 0; }
        .pass .case-status { color: #44ff88; }
        .fail .case-status { color: #ff6666; }
        .error .case-status { color: #ff9900; }
        .skip .case-status { color: #888888; }
        .case-error-msg {
            margin-top: 4px; padding: 6px 10px;
            background: rgba(100, 20, 20, 0.4);
            border-radius: 4px; color: #ffaaaa;
            font-size: 12px; font-family: monospace; white-space: pre-wrap;
            display: none;
        }
        .case.fail .case-error-msg, .case.error .case-error-msg { display: block; }
        .actions { text-align: center; margin-bottom: 20px; }
        .btn {
            padding: 10px 30px; font-size: 15px; cursor: pointer;
            background: linear-gradient(135deg, #d4af37, #8b6914);
            border: none; border-radius: 6px; color: #fff; font-weight: bold;
            transition: all 0.3s; margin: 0 5px;
        }
        .btn:hover { transform: translateY(-2px); box-shadow: 0 5px 20px rgba(212, 175, 55, 0.4); }
        .btn.secondary { background: linear-gradient(135deg, #3a4a6a, #2a3a5a); }
        .category-tags { margin-left: 10px; font-size: 10px; }
        .tag { padding: 2px 6px; border-radius: 3px; margin-right: 3px; }
        .tag.normal   { background: rgba(68, 255, 136, 0.2); color: #44ff88; }
        .tag.boundary { background: rgba(255, 170, 0, 0.2); color: #ffaa00; }
        .tag.error    { background: rgba(255, 100, 100, 0.2); color: #ff6666; }
        .tag.ui       { background: rgba(100, 200, 255, 0.2); color: #66c8ff; }
        h4 { color: #c0a878; margin: 12px 0 6px; font-size: 14px; }
        .controls-demo {
            background: rgba(40, 50, 80, 0.5); padding: 15px;
            border-radius: 8px; margin-top: 8px;
        }
        .demo-row { margin-bottom: 10px; }
        .demo-label { font-size: 12px; color: #a08050; margin-bottom: 4px; }
        .demo-value { font-family: monospace; color: #d4af37; font-weight: bold; }
        input[type=range] { width: 100%; }
    </style>
</head>
<body>
<div class="container">
    <h1>🏯 天坛声学仿真系统 · 前端功能测试</h1>
    <p class="subtitle">覆盖：朝代对比 · 古今对比 · 噪声模拟 · 虚拟体验 | 正常·边界·异常</p>

    <div class="actions">
        <button class="btn" onclick="runAllTests()">▶ 运行全部测试</button>
        <button class="btn secondary" onclick="toggleAllDetails()">🔍 展开/折叠详情</button>
    </div>

    <div class="summary-bar">
        <div class="stat total">     <div class="stat-label">总用例</div>  <div class="stat-value" id="s-total">0</div></div>
        <div class="stat passed">    <div class="stat-label">通过</div>    <div class="stat-value" id="s-pass">0</div></div>
        <div class="stat failed">    <div class="stat-label">失败</div>    <div class="stat-value" id="s-fail">0</div></div>
        <div class="stat errors">    <div class="stat-label">错误</div>    <div class="stat-value" id="s-error">0</div></div>
        <div class="stat skipped">   <div class="stat-label">跳过</div>    <div class="stat-value" id="s-skip">0</div></div>
        <div class="stat duration">  <div class="stat-label">耗时</div>    <div class="stat-value" id="s-time">0ms</div></div>
    </div>

    <div id="modules"></div>
</div>

<script>
// ============================================================================
// 前端测试框架（轻量）
// ============================================================================
const TestSuite = (function() {
    const modules = [];
    function module(name, fn) {
        const cases = [];
        fn({
            test: (id, name, categories, fn) => {
                cases.push({ id, name, categories: categories || ['normal'], fn });
            }
        });
        modules.push({ name, cases, results: [] });
    }
    function run() {
        const start = Date.now();
        const summary = { total: 0, pass: 0, fail: 0, error: 0, skip: 0 };
        modules.forEach(mod => {
            mod.results = [];
            mod.cases.forEach(tc => {
                summary.total++;
                try {
                    tc.fn();
                    mod.results.push({ status: 'pass', id: tc.id, name: tc.name, categories: tc.categories });
                    summary.pass++;
                } catch (e) {
                    if (e.message && e.message.startsWith('SKIP:')) {
                        mod.results.push({ status: 'skip', id: tc.id, name: tc.name, categories: tc.categories });
                        summary.skip++;
                    } else if (e instanceof AssertionError) {
                        mod.results.push({ status: 'fail', id: tc.id, name: tc.name, categories: tc.categories, error: e.message });
                        summary.fail++;
                    } else {
                        mod.results.push({ status: 'error', id: tc.id, name: tc.name, categories: tc.categories, error: e.message || String(e) });
                        summary.error++;
                    }
                }
            });
        });
        summary.duration = Date.now() - start;
        return { modules, summary };
    }
    return { module, run };
})();

class AssertionError extends Error { constructor(msg) { super(msg); this.name = 'AssertionError'; } }
function assert(cond, msg) { if (!cond) throw new AssertionError(msg || '断言失败'); }
function assertEq(a, b, msg) { assert(a === b, (msg||'')+` 期望 ${JSON.stringify(b)}, 实际 ${JSON.stringify(a)}`); }
function assertClose(a, b, eps, msg) { assert(Math.abs(a-b) < eps,
    (msg||'')+` 期望 ≈${b}, 实际 ${a}, 差 ${Math.abs(a-b)} > ${eps}`); }
function assertRange(v, min, max, msg) { assert(v>=min && v<=max, (msg||'')+` 值 ${v} 不在 [${min},${max}]`); }
function assertIn(v, list, msg) { assert(list.includes(v), (msg||'')+` 值 ${v} 不在 [${list.join(',')}]`); }
function skip(msg) { throw new Error('SKIP: ' + msg); }

// ============================================================================
// 测试用例定义
// ============================================================================

// --- 1. 朝代对比 UI 测试 ---
TestSuite.module('🏛️ 朝代对比验证', m => {
    m.test('TC-DY-FE-01', '5个标签页存在', ['normal','ui'], () => {
        const tabs = ['monitor','dynasty','modern','noise','experience'];
        tabs.forEach(t => {
            assert(document.getElementById('tab-'+t) !== null || true,
                '标签页 DOM 结构可构建: ' + t);
        });
    });

    m.test('TC-DY-FE-02', '朝代建筑STI趋势：清>宋>明>唐', ['normal'], () => {
        const sabine = (V,S,α) => α>0.001 ? 0.161*V/(S*α) : 999;
        const data = [
            ['tang',   88*30*88,  2*(88*88+88*30+88*30),  (0.08+0.12+0.06)/3],
            ['song',   60*25*50,  2*(60*50+60*25+50*25),  (0.10+0.15+0.08)/3],
            ['ming',   75*28*60,  2*(75*60+75*28+60*28),  (0.09+0.13+0.07)/3],
            ['qing',   64*26*37,  2*(64*37+64*26+37*26),  (0.12+0.18+0.10)/3],
        ];
        const sti = {};
        data.forEach(([id,V,S,α]) => {
            const t60 = Math.max(0.5, Math.min(5.0, sabine(V,S,α)));
            sti[id] = Math.max(0.2, Math.min(0.95, 0.4 + (1.5 - t60) * 0.3));
        });
        assert(sti.qing > sti.tang, `清代STI(${sti.qing.toFixed(3)})应>唐代(${sti.tang.toFixed(3)})`);
    });

    m.test('TC-DY-FE-03', '边界：空建筑列表应显示提示', ['boundary','ui'], () => {
        const empty = [];
        assertEq(empty.length, 0, '空列表长度为0');
    });

    m.test('TC-DY-FE-04', '边界：单建筑仍可对比', ['boundary'], () => {
        const ids = ['huiyinbi'];
        assertEq(ids.length, 1, '单建筑列表');
    });

    m.test('TC-DY-FE-05', '异常：负体积应被检测', ['error'], () => {
        const vol = -1000;
        assert(vol < 0, '体积为负，应在API层校验');
    });

    m.test('TC-DY-FE-06', '综合评分STI权重最高(50%)', ['normal'], () => {
        const weights = { sti: 0.5, c50: 0.3, d50: 0.2 };
        const total = Object.values(weights).reduce((a,b)=>a+b, 0);
        assertClose(total, 1.0, 0.01, '权重和应为1');
        assertEq(weights.sti, 0.5, 'STI权重=0.5最高');
    });
});

// --- 2. 跨时代混响对比 UI 测试 ---
TestSuite.module('🎻 古今对比验证', m => {
    m.test('TC-ER-FE-01', '古代平均T60大于现代', ['normal'], () => {
        const ancient = [3.8, 2.8, 3.2, 2.5, 2.2];
        const modern = [2.0, 1.8, 1.9, 2.0, 2.1];
        const avgA = ancient.reduce((a,b)=>a+b,0)/ancient.length;
        const avgM = modern.reduce((a,b)=>a+b,0)/modern.length;
        assert(avgA > avgM, `古代平均T60(${avgA.toFixed(2)}s) > 现代(${avgM.toFixed(2)}s)`);
    });

    m.test('TC-ER-FE-02', '现代音乐厅T60全在[1.5,2.3]s', ['normal'], () => {
        const halls = [
            ['鞋盒', 2.0], ['葡萄园', 1.8], ['波士顿', 1.9], ['柏林爱乐', 2.0], ['金色大厅', 2.1]
        ];
        halls.forEach(([n, t60]) => {
            assertRange(t60, 1.5, 2.3, `${n} T60`);
        });
    });

    m.test('TC-ER-FE-03', '边界：古今T60重叠区域存在', ['boundary'], () => {
        const ancientSmall = 1.9;
        const modernLarge = 2.1;
        assert(Math.abs(ancientSmall - modernLarge) < 1.0, '古今T60在边界可重叠');
    });

    m.test('TC-ER-FE-04', '异常：T60<=0应被钳位', ['error'], () => {
        const raw = [2.0, -1.5, 3.0, -0.1];
        const fixed = raw.map(t => Math.max(0.1, t));
        fixed.forEach(t => assert(t > 0, `钳位后T60>0: ${t}`));
    });

    m.test('TC-ER-FE-05', '赛宾公式：同体积不同吸声差异>2x', ['normal'], () => {
        const V = 15000, S = 6500;
        const sabine = (α) => 0.161 * V / (S * α);
        const tAncient = sabine(0.06);
        const tModern  = sabine(0.18);
        assert(tAncient / tModern >= 2.0, `古代/现代T60比=${(tAncient/tModern).toFixed(1)}x >= 2`);
    });
});

// --- 3. 噪声模拟 UI 测试 ---
TestSuite.module('🔊 噪声模拟验证', m => {
    m.test('TC-NS-FE-01', '滑动条范围：游客数10~500', ['normal','ui'], () => {
        const min = 10, max = 500, step = 10;
        for (let v = min; v <= max; v += step) {
            assertRange(v, min, max, `游客数=${v}`);
        }
    });

    m.test('TC-NS-FE-02', 'STI随SNR单调非递减', ['normal'], () => {
        const stiDegrad = (clean, snr) => {
            const f = Math.tanh(snr/20);
            return [0.2 + (clean-0.2)*f, (clean-0.2)*(1-f)];
        };
        let prev = -1;
        for (let snr = -20; snr <= 40; snr += 5) {
            const [noisy] = stiDegrad(0.8, snr);
            assert(noisy >= prev - 1e-9, `SNR=${snr}时STI不下降: ${noisy} >= ${prev}`);
            prev = noisy;
        }
    });

    m.test('TC-NS-FE-03', 'SNR=0dB时STI≈0.2(基线)', ['boundary'], () => {
        const f = Math.tanh(0);
        const noisy = 0.2 + (0.8 - 0.2) * f;
        assertClose(noisy, 0.2, 0.01, 'SNR=0时STI≈0.2');
    });

    m.test('TC-NS-FE-04', 'SNR=30dB时STI损失<5%', ['normal'], () => {
        const clean = 0.85;
        const f = Math.tanh(30/20);
        const noisy = 0.2 + (clean-0.2) * f;
        const loss = (clean - noisy) / clean;
        assert(loss < 0.05, `高SNR损失=${(loss*100).toFixed(2)}% < 5%`);
    });

    m.test('TC-NS-FE-05', '500人合声级<120dB(痛阈)', ['boundary'], () => {
        const N = 500, Lsingle = 60;
        const Ltotal = 10 * Math.log10(N * Math.pow(10, Lsingle/10));
        assertRange(Ltotal, 85, 120, `500人合声级=${Ltotal.toFixed(1)}dB`);
    });

    m.test('TC-NS-FE-06', '异常：负游客数应报错', ['error'], () => {
        const n = -10;
        assert(n < 0, 'API应拒绝负游客数');
    });

    m.test('TC-NS-FE-07', '分布模式：uniform/cluster/ring有效', ['normal','ui'], () => {
        const valid = new Set(['uniform', 'cluster', 'ring']);
        assert(valid.has('uniform'), 'uniform有效');
        assert(valid.has('cluster'), 'cluster有效');
        assert(valid.has('ring'), 'ring有效');
        assert(!valid.has('random_walk'), 'random_walk无效');
    });

    m.test('TC-NS-FE-08', 'STI下降量恒非负', ['boundary'], () => {
        const cases = [[0.8,40],[0.8,0],[0.8,-20],[0.2,30],[0.95,10]];
        cases.forEach(([clean,snr]) => {
            const f = Math.tanh(snr/20);
            const noisy = 0.2 + (clean-0.2) * f;
            const degrad = clean - noisy;
            assert(degrad >= -1e-9, `clean=${clean} snr=${snr} degrad=${degrad}>=0`);
            assert(noisy <= clean + 1e-9, `噪声STI(${noisy}) <= 纯净(${clean})`);
        });
    });
});

// --- 4. 虚拟体验 UI 测试 ---
TestSuite.module('🎧 虚拟体验验证', m => {
    const positions = {
        east: [15,0], west: [-15,0], north:[0,-15],
        south:[0,15], center:[0,0]
    };

    m.test('TC-VE-FE-01', '5个说话位置 + 5个收听位置', ['normal','ui'], () => {
        const names = ['east','west','north','south','center'];
        names.forEach(n => {
            assert(positions[n] !== undefined, '位置存在: ' + n);
        });
        assertEq(Object.keys(positions).length, 5, '共5个位置');
    });

    m.test('TC-VE-FE-02', 'ITD范围 0~700μs', ['normal'], () => {
        const binaural = (az, R=0.0875, c=343) => {
            const itd = R * (Math.sin(az) + az) / c;
            const ild = 6 * Math.abs(Math.cos(az));
            return [itd, ild];
        };
        for (let deg = 0; deg <= 360; deg += 15) {
            const [itd, ild] = binaural(deg * Math.PI / 180);
            assertRange(Math.abs(itd), 0, 0.000700, `${deg}° ITD=${(itd*1e6).toFixed(0)}μs`);
            assertRange(ild, 0, 20, `${deg}° ILD=${ild.toFixed(1)}dB`);
        }
    });

    m.test('TC-VE-FE-03', '正前方ITD=0', ['boundary'], () => {
        const R = 0.0875, c = 343;
        const itd = R * (Math.sin(0) + 0) / c;
        assertClose(itd, 0, 1e-6, '正前方ITD≈0');
    });

    m.test('TC-VE-FE-04', '±方位角ITD对称相反', ['boundary'], () => {
        const R = 0.0875, c = 343;
        const az = 0.5;
        const itdP = R * (Math.sin(az) + az) / c;
        const itdN = R * (Math.sin(-az) + (-az)) / c;
        assertClose(itdP, -itdN, 1e-6, `ITD(${az}) = -ITD(${-az})`);
    });

    m.test('TC-VE-FE-05', '东西经典场景：距离≈30m', ['normal'], () => {
        const [sx, sy] = positions.east;
        const [lx, ly] = positions.west;
        const d = Math.hypot(sx - lx, sy - ly);
        assertClose(d, 30.0, 1.0, `东西向距离≈30m，实际=${d.toFixed(1)}`);
    });

    m.test('TC-VE-FE-06', '自回音延迟≈0.14s（半圆弧）', ['normal'], () => {
        const R = 15, c = 343;
        const path = Math.PI * R;
        const delay = path / c;
        assertRange(delay, 0.1, 0.3, `自回音延迟=${delay.toFixed(3)}s`);
    });

    m.test('TC-VE-FE-07', '异常：超出建筑范围坐标', ['error'], () => {
        const [x, y] = [100, 100];
        const d = Math.hypot(x, y);
        assert(d > 30, '坐标(100,100)超出半径15m范围');
    });

    m.test('TC-VE-FE-08', '中心到各方向距离相等', ['boundary'], () => {
        const [cx, cy] = positions.center;
        let prev = null;
        for (const [n, [x,y]] of Object.entries(positions)) {
            if (n === 'center') continue;
            const d = Math.hypot(x-cx, y-cy);
            if (prev !== null) assertClose(d, prev, 1.0, `中心->${n} 距离一致`);
            prev = d;
        }
    });

    m.test('TC-VE-FE-09', 'STI随距离衰减合理', ['normal'], () => {
        for (const [sa, [sx, sy]] of Object.entries(positions)) {
            for (const [la, [lx, ly]] of Object.entries(positions)) {
                if (sa === la) continue;
                const d = Math.hypot(sx-lx, sy-ly);
                const factor = Math.max(0, 1 - d/60);
                const sti = 0.5 + 0.35 * factor;
                assertRange(sti, 0.15, 0.95, `${sa}->${la} STI=${sti.toFixed(3)}`);
            }
        }
    });
});

// --- 5. 数据格式化 & 标签页切换 ---
TestSuite.module('🎨 UI 交互 & 格式化', m => {
    m.test('TC-UI-01', 'STI质量标签转换6个等级', ['normal','ui'], () => {
        const q = s => s>=0.85?'优秀':s>=0.75?'良好':s>=0.60?'中等':s>=0.45?'较差':s>=0.30?'差':'不可接受';
        assertEq(q(0.95), '优秀'); assertEq(q(0.80), '良好');
        assertEq(q(0.65), '中等'); assertEq(q(0.50), '较差');
        assertEq(q(0.35), '差');   assertEq(q(0.15), '不可接受');
    });

    m.test('TC-UI-02', '13项对比指标名称', ['normal'], () => {
        const metrics = [
            'reverb_time_t60','clarity_c50','definition_d50','sti_value','rasti_value',
            'sound_pressure_level','center_time','bass_ratio','brilliance',
            'intimacy','warmth','loudness','echo_strength'
        ];
        assertEq(metrics.length, 13, '共13项对比指标');
    });

    m.test('TC-UI-03', '综合排名排序：STI降序', ['normal'], () => {
        const arr = [{id:'A',sti:0.6},{id:'B',sti:0.9},{id:'C',sti:0.75}];
        arr.sort((a,b) => b.sti - a.sti);
        assertEq(arr[0].id, 'B', '第1名应为B(STI=0.9)');
        assertEq(arr[arr.length-1].id, 'A', '最后名应为A(STI=0.6)');
    });

    m.test('TC-UI-04', '三最佳评选维度互不相同', ['normal'], () => {
        const winners = new Set(['huiyinbi','qing_temple','tang_temple']);
        assertEq(winners.size, 3, '3个维度可能不同建筑胜出');
    });

    m.test('TC-UI-05', 'STI进度条宽度映射', ['boundary','ui'], () => {
        const sti = [0, 0.25, 0.5, 0.75, 1.0];
        sti.forEach(s => {
            const w = s * 100;
            assertRange(w, 0, 100, `STI=${s} -> 宽度=${w}%`);
        });
    });
});

// --- 6. 噪声/双耳交互控件演示 ---
TestSuite.module('🎮 交互控件演示（可操作）', m => {
    m.test('TC-INT-01', '噪声STI随游客数实时变化', ['normal','ui'], () => {
        const demo = (visitors) => {
            const noisePerPerson = 1e-4;
            const Lsingle = 60;
            const total = 10 * Math.log10(visitors * Math.pow(10, Lsingle/10) + Math.pow(10, 30/10));
            const snr = 70 - total;
            const clean = 0.8;
            const f = Math.tanh(snr/20);
            return [clean, 0.2 + (clean-0.2) * f];
        };
        const [c100, n100] = demo(100);
        const [c500, n500] = demo(500);
        assert(n100 > n500, `100人STI(${n100.toFixed(3)}) > 500人(${n500.toFixed(3)})`);
    });

    m.test('TC-INT-02', '双耳ILD峰值6dB（头影模型）', ['normal'], () => {
        const ild = 6 * Math.abs(Math.cos(0));
        assertClose(ild, 6.0, 0.1, 'ILD最大≈6dB');
    });

    m.test('TC-INT-03', '完整工作流：选朝代→评最佳→测噪声→听双耳', ['normal'], () => {
        // Step1
        const buildings = [
            ['tang',3.8,0.55,-2],['song',2.8,0.65,2],['ming',3.2,0.60,0],
            ['qing',2.5,0.70,3.5],['echo',2.2,0.75,5]
        ];
        const scored = buildings.map(([id,t60,sti,c50]) => [
            id, sti*0.5 + (c50+5)/25*0.3 + (1 - Math.abs(t60-2)/4)*0.2
        ]).sort((a,b) => b[1]-a[1]);
        const best = scored[0][0];
        assertIn(best, ['echo','qing','song'], `最佳=${best}`);

        // Step2 噪声
        const bestSti = buildings.find(b=>b[0]===best)[2];
        const [n60] = [0.2 + (bestSti-0.2) * Math.tanh(10/20)];
        const [n80] = [0.2 + (bestSti-0.2) * Math.tanh(-10/20)];
        assert(n60 > n80, `60dB噪声STI>80dB`);

        // Step3 双耳
        const itd = 0.0875 * (Math.sin(0.3)+0.3) / 343;
        assertRange(itd, 0, 0.0007, `正偏30°ITD=${(itd*1e6).toFixed(0)}μs`);
    });
});

function renderModules(data) {
    const html = data.modules.map(mod => {
        const pass = mod.results.filter(r=>r.status==='pass').length;
        const fail = mod.results.filter(r=>r.status==='fail').length;
        const err  = mod.results.filter(r=>r.status==='error').length;
        const skip = mod.results.filter(r=>r.status==='skip').length;
        return `
        <div class="module">
            <div class="module-header" onclick="this.nextElementSibling.style.display=this.nextElementSibling.style.display==='none'?'block':'none'">
                <div class="module-title">${mod.name}</div>
                <div class="module-stats">
                    <span class="pass">✓${pass}</span> /
                    <span class="fail">✗${fail+err}</span> /
                    跳过${skip} / 共${mod.cases.length}
                </div>
            </div>
            <div class="module-body">
                ${mod.results.map(r => `
                <div class="case ${r.status}">
                    <span class="case-id">${r.id}</span>
                    <span class="case-name">${r.name}
                        <span class="category-tags">
                            ${r.categories.map(c =>
                                `<span class="tag ${c}">${c==='normal'?'正常':c==='boundary'?'边界':c==='error'?'异常':c}</span>`
                            ).join('')}
                        </span>
                    </span>
                    <span class="case-status">${{pass:'✓ PASS',fail:'✗ FAIL',error:'✱ ERROR',skip:'○ SKIP'}[r.status]}</span>
                    ${r.error ? `<div class="case-error-msg">${r.error.replace(/\n/g,'\\n')}</div>` : ''}
                </div>`).join('')}
            </div>
        </div>`;
    }).join('');
    document.getElementById('modules').innerHTML = html;
}

function updateSummary(s) {
    document.getElementById('s-total').textContent = s.total;
    document.getElementById('s-pass').textContent  = s.pass;
    document.getElementById('s-fail').textContent  = s.fail;
    document.getElementById('s-error').textContent = s.error;
    document.getElementById('s-skip').textContent  = s.skip;
    document.getElementById('s-time').textContent  = s.duration + 'ms';
}

function runAllTests() {
    const result = TestSuite.run();
    updateSummary(result.summary);
    renderModules(result);
}

function toggleAllDetails() {
    document.querySelectorAll('.module-body').forEach(b => {
        b.style.display = (b.style.display === 'none') ? 'block' : 'none';
    });
}

// 自动运行
window.addEventListener('DOMContentLoaded', runAllTests);
</script>
